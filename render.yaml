services:
  - type: web
    name: expense-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/stats
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
