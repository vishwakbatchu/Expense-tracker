
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - Expense Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-container">
  <h1>Expense Tracker</h1>
  <p>Set a new password</p>
  <form id="reset-form">
    <label for="username">Username</label>
    <input type="text" id="username" required>
    <label for="code">6-digit reset code</label>
    <input type="text" id="code" inputmode="numeric" pattern="\d{6}" maxlength="6" required>
    <label for="password">New password</label>
    <input type="password" id="password" minlength="8" required>
    <button type="submit">Reset Password</button>
  </form>
  <p id="reset-message"></p>
  <p><a href="/">Back to sign in</a></p>
</div>
<script>
const form = document.getElementById("reset-form");
const messageEl = document.getElementById("reset-message");

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  const username = document.getElementById("username").value.trim();
  const code = document.getElementById("code").value.trim();
  const password = document.getElementById("password").value;
  messageEl.textContent = "Resetting...";
  try {
    const response = await fetch("/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, code, password }),
    });
    const data = await response.json();
    if (response.ok) {
      messageEl.textContent = "Password reset! You can now sign in.";
      form.style.display = "none";
    } else {
      messageEl.textContent = data.detail || "Something went wrong.";
    }
  } catch (err) {
    messageEl.textContent = "Network error. Please try again.";
  }
});
</script>
</body>
</html>
